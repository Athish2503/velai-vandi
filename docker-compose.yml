services:

  db:
    image: pgvector/pgvector:pg16
    container_name: velai_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: velai
      POSTGRES_USER: velai
      POSTGRES_PASSWORD: velai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velai -d velai"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: velai_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://velai:velai@db:5432/velai
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: velai_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
